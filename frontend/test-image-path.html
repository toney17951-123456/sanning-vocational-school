<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试图片路径</title>
  <script type="module">
    // 测试 BASE_URL
    console.log('BASE_URL:', import.meta.env.BASE_URL);
    
    // 测试图片路径
    const img = new Image();
    img.src = import.meta.env.BASE_URL + 'images/zhixiaodamen.jpg';
    img.onload = () => {
      console.log('图片加载成功:', img.src);
    };
    img.onerror = (e) => {
      console.error('图片加载失败:', img.src, e);
    };
    
    // 添加图片到页面
    document.body.appendChild(img);
  </script>
</head>
<body>
  <h1>测试图片路径</h1>
  <p>查看浏览器控制台获取更多信息</p>
</body>
</html>
